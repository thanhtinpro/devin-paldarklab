; PALDARK W1 day 11-14 — Enhanced Input wiring.
;
; UE 5.4 ships Enhanced Input as the default but we still pin the input classes
; here so:
;   - the project compiles to the same input behaviour on any UE branch,
;   - PaldarkCharacter::SetupPlayerInputComponent can safely cast its
;     PlayerInputComponent to UEnhancedInputComponent without conditional code,
;   - regenerating settings in the editor doesn't silently swap us back to the
;     legacy UPlayerInput.
;
; UPaldarkInputConfig (Experience/PaldarkInputConfig.h) provides the
; (Paldark.InputTag.* → UInputAction) lookup. Designers author per-PawnData
; configs; the character reads them in BindNativeInputActions.

[/Script/Engine.InputSettings]
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent
