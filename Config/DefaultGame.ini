; -----------------------------------------------------------------------------
; Asset Manager — primary asset types (W1 day 6-7).
; These rows let the editor's Asset Manager UI discover Paldark experiences and
; pawn data assets without designers having to add rules manually. Runtime
; registration is also performed in C++ inside UPaldarkAssetManager so the two
; paths stay in sync. The default paths under /Game/Paldark/... are the
; recommended layout the README documents.
; -----------------------------------------------------------------------------

