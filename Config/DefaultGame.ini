; -----------------------------------------------------------------------------
; W42-43 — AWS backend integration. Client-side knobs surfaced in Project
; Settings → Plugins → Paldark Backend (UPaldarkBackendSettings, a
; UDeveloperSettings). Default ships with `bUseAWSBackend=False` so cold-clone
; devs / CI hit the mocked fallback path (UPaldarkBackendSubsystem returns
; `FPaldarkFleetSpec::MakeLoopback()` on next tick). A developer flips
; bUseAWSBackend=True locally + fills LambdaApiBaseUrl / CognitoUserPoolId /
; CognitoAppClientId once SRE provisions the real endpoints. Production +
; staging configs override these via a per-config ini (DefaultGame_Production.ini
; etc.) — never commit real Cognito ids to the public repo.
;
; Knob shape:
;   bUseAWSBackend          — master switch (False = mock fallback).
;   AWSRegion               — log-only string; actual region encoded in URL.
;   LambdaApiBaseUrl        — empty default. Flipping bUseAWSBackend with empty
;                             URL is logged at Warning + falls back to mock.
;   CognitoUserPoolId       — sent as `X-Paldark-Pool` header.
;   CognitoAppClientId      — sent in login/refresh body.
;   RequestTimeoutSeconds   — 15s default (Lambda cold start budget).
;   MaxRetries              — 3 retries on 5xx / network failure (fleet
;                             requests only — never on login/refresh).
;   RetryBackoffSeconds     — linear backoff (2s × N).
;   TokenRefreshLeadSeconds — 300s default (refresh 5 minutes pre-expiry).
; -----------------------------------------------------------------------------
[/Script/PaldarkLab.PaldarkBackendSettings]
bUseAWSBackend=False
AWSRegion=ap-northeast-1
LambdaApiBaseUrl=
CognitoUserPoolId=
CognitoAppClientId=
RequestTimeoutSeconds=15.0
MaxRetries=3
RetryBackoffSeconds=2.0
TokenRefreshLeadSeconds=300
